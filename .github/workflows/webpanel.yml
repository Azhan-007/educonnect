name: Web Panel Tests & Build

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/educonnect-webpanel/**"
      - ".github/workflows/webpanel.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/educonnect-webpanel/**"
      - ".github/workflows/webpanel.yml"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/educonnect-webpanel/package-lock.json"

      - name: Install dependencies
        working-directory: apps/educonnect-webpanel
        run: npm ci

      - name: Run ESLint
        working-directory: apps/educonnect-webpanel
        run: npm run lint --if-present || true

      - name: Run TypeScript compiler
        working-directory: apps/educonnect-webpanel
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/educonnect-webpanel/package-lock.json"

      - name: Install dependencies
        working-directory: apps/educonnect-webpanel
        run: npm ci

      - name: Build project
        working-directory: apps/educonnect-webpanel
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webpanel-build
          path: apps/educonnect-webpanel/.next/
          retention-days: 5

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/educonnect-webpanel/package-lock.json"

      - name: Install dependencies
        working-directory: apps/educonnect-webpanel
        run: npm ci

      - name: Run tests
        working-directory: apps/educonnect-webpanel
        run: npm run test --if-present || true
