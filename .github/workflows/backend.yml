name: Backend Tests & Build

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend.yml"

jobs:
  # ─────────────────────────────────────────────────────────
  # LINT — ESLint checks
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/backend/package-lock.json"

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Run ESLint
        working-directory: apps/backend
        run: npm run lint --if-present || true

      - name: Run Prettier check
        working-directory: apps/backend
        run: npm run format:check --if-present || true

  # ─────────────────────────────────────────────────────────
  # TYPE CHECK — TypeScript compilation
  # ─────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/backend/package-lock.json"

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Run TypeScript compiler
        working-directory: apps/backend
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────
  # BUILD — Compile to JavaScript
  # ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/backend/package-lock.json"

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Build project
        working-directory: apps/backend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: apps/backend/dist/
          retention-days: 5

  # ─────────────────────────────────────────────────────────
  # UNIT TESTS — Jest unit tests
  # ─────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/backend/package-lock.json"

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Run unit tests
        working-directory: apps/backend
        run: npm run test:unit --if-present

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/backend/coverage/lcov.info
          flags: backend-unit
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────
  # INTEGRATION TESTS — Firebase Emulator tests
  # ─────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/backend/package-lock.json"

      - name: Setup Java (for Firebase Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Run integration tests
        working-directory: apps/backend
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
          NODE_ENV: test
          FIREBASE_EMULATOR_HOST: localhost:9199
        run: npm run test:integration --if-present || npm run test --if-present

  # ─────────────────────────────────────────────────────────
  # SECURITY — Dependency audit
  # ─────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run npm audit
        working-directory: apps/backend
        run: npm audit --production || true

      - name: Check for known security vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "apps/backend"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

  # ─────────────────────────────────────────────────────────
  # SUMMARY — Check all required jobs
  # ─────────────────────────────────────────────────────────
  check-all:
    name: ✅ All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build, test-unit, test-integration]
    if: always()
    steps:
      - name: Decide whether all checks passed
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.typecheck.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]] || \
             [[ "${{ needs.test-unit.result }}" == "failure" ]] || \
             [[ "${{ needs.test-integration.result }}" == "failure" ]]; then
            echo "❌ One or more checks failed"
            exit 1
          fi
          echo "✅ All checks passed!"
